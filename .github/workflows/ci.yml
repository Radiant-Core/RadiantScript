name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        node-version: [20.x, 22.x]
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Build packages
        run: npm run build --if-present
      
      - name: Run linter
        run: npm run lint --if-present
      
      - name: Run tests
        run: npm test
      
      - name: Upload coverage
        if: matrix.node-version == '22.x'
        uses: codecov/codecov-action@v4
        with:
          fail_ci_if_error: false

  typecheck:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Type check
        run: npx tsc --noEmit

  compile-contracts:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Build compiler
        run: npm run build --if-present
      
      - name: Compile Glyph v2 contracts
        run: |
          set -e
          if [ -d "examples/radiant" ]; then
            shopt -s nullglob
            failed=0
            count=0
            for contract in examples/radiant/*.rxd; do
              count=$((count + 1))
              echo "Compiling: $contract"
              if ! npx rxdc "$contract" --output "${contract%.rxd}.json"; then
                echo "::error file=$contract::Compilation failed"
                failed=$((failed + 1))
              fi
            done
            echo "Compiled $count contracts; $failed failed."
            if [ "$failed" -gt 0 ]; then
              exit 1
            fi
          fi

      - name: Verify contract artifacts
        run: |
          if [ -d "examples/radiant" ]; then
            ls -la examples/radiant/*.json 2>/dev/null || (echo "No compiled artifacts found" && exit 1)
          fi
